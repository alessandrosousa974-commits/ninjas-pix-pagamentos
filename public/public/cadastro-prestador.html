<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Prestador</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }
    input, select, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 300px;
    }
  </style>
</head>
<body>
  <h2>Cadastro de Prestador 🧑‍🔧</h2>

  <form id="formPrestador">
    <input type="text" id="nome" placeholder="Nome completo" required>
    <input type="text" id="cpf" placeholder="CPF" required>
    <select id="area">
      <option value="">Selecione a área</option>
      <option value="limpeza">Limpeza</option>
      <option value="cozinha">Cozinha</option>
      <option value="motoboy">Motoboy</option>
      <option value="manutencao">Manutenção</option>
    </select>
    <input type="text" id="cidade" placeholder="Cidade" required>
    <button type="submit">Salvar</button>
  </form>

  <p id="msg"></p>

  <script>
    document.getElementById('formPrestador').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const nome = document.getElementById('nome').value;
      const cpf = document.getElementById('cpf').value;
      const area = document.getElementById('area').value;
      const cidade = document.getElementById('cidade').value;

      // Aqui pode integrar com Firebase Firestore ou backend
      console.log("Prestador cadastrado:", { nome, cpf, area, cidade });
      document.getElementById('msg').textContent = "✅ Prestador cadastrado com sucesso!";
      
      // Limpa o formulário
      this.reset();
    });
  </script>
</body>
</html>
