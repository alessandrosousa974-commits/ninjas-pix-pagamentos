<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Ninjas do Sushi</title>
  <!-- Firebase + Config -->
  <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js"></script>
  <script src="firebaseConfig.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }
    h2 {
      color: #007bff;
    }
    nav a {
      display: block;
      margin: 10px 0;
      font-size: 18px;
      color: #333;
      text-decoration: none;
    }
    nav a:hover {
      color: #007bff;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>
  <h2>Bem-vindo, <span id="nomeUsuario"></span> 👋</h2>

  <nav>
    <a href="cadastro-prestador.html">📋 Cadastro de Prestador</a>
    <a href="cadastro-contratante.html">🏢 Cadastro de Contratante</a>
    <a href="pagamento.html">💰 Pagamento via PIX</a>
    <a href="ponto.html">📍 Bater Ponto (QR Code)</a>
    <a href="avaliacoes.html">⭐ Avaliações</a>
    <a href="historico.html">📜 Histórico de Pagamentos</a>
  </nav>

  <button onclick="logout()">Sair</button>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) {
      window.location.href = "login.html";
    } else {
      document.getElementById("nomeUsuario").textContent = user.displayName;
    }

    function logout() {
      firebase.auth().signOut().then(() => {
        localStorage.removeItem("user");
        window.location.href = "login.html";
      });
    }
  </script>
</body>
</html>
