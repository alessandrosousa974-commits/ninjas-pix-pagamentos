<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login com Google</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js"></script>
  <script src="../firebaseConfig.js"></script>
</head>
<body>
  <h2>Login com Google</h2>
  <button id="btnGoogle">Entrar com Gmail</button>

  <script>
    document.getElementById("btnGoogle").onclick = () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then(result => {
          const user = result.user;
          localStorage.setItem("user", JSON.stringify(user));
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          console.error("Erro no login:", error.message);
          alert("Falha no login com Gmail");
        });
    };
  </script>
</body>
</html>
